name: Security Audit (pip-audit)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  pip-audit:
    name: pip-audit api-proxy dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Render requirements.txt from api-proxy template
        run: bun run scripts/render-requirements.ts /tmp/pip-audit-reqs

      - name: Run pip-audit
        run: pip-audit -r /tmp/pip-audit-reqs/requirements.txt
